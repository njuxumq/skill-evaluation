  不暴露内部 dataset_id、不输出"正在执行"等过程描述。

  '
assertions:
  hard:
    rules: []
    custom:
    - type: text_absent
      pattern: ds-synth-001
      scope: all_text
    - type: text_absent
      pattern: 正在执行
      scope: all_text
    - type: text_absent
      pattern: 正在加载
      scope: all_text
  soft: all
