id: init_02_has_history_no_intent
name: 有历史任务但用户未描述具体需求
stage: init
priority: P0

instruction: "评测 skill"

fixtures:
  check-token:
    status: valid
    expires_at: "2026-07-01T00:00:00Z"
  recent-tasks:
    tasks:
      - session_id: "20260608_100000_abc"
        skill_name: "test-skill"
        model: "GLM-5"
        status: "completed"
        task_id: "eval-3g5k9m"
        progress: 100
        created_at: "2026-06-08T10:00:00Z"

expected_behavior: |
  有历史任务时必须先展示历史任务表（Markdown 表格），同时提供"新建"入口。
  不得暴露内部 task_id。

assertions:
  hard:
    rules: ["H7"]
    custom:
      - type: semantic_match
        pattern: "向用户展示了历史评测任务列表"
        scope: all_text
      - type: text_present
        pattern: "新建"
        scope: all_text
      - type: text_absent
        pattern: "eval-3g5k9m"
        scope: all_text
      - type: format_check
        check: markdown_table
        scope: all_text
  soft: all
