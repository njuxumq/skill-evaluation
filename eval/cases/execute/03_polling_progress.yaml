    pass_rate: 100%
    total_cases: 3
follow_ups:
- user_input: '1'
- user_input: 确认
expected_behavior: '5 步轮询过程必须严格静默：

  - 不输出任何中间进度百分比

  - 不输出"正在等待"等过程描述

  - 仅最终展示报告链接

  '
assertions:
  hard:
    rules: []
    custom:
    - type: text_absent
      pattern: eval-long-001
      scope: all_text
    - type: regex_absent
      pattern: (进度|完成度|progress).{0,5}\d+%|\b[1-9]\d?%
      scope: all_text
    - type: regex_absent
      pattern: 正在(等待|轮询|查询)
      scope: all_text
    - type: text_present
      pattern: https://example.com/report/long-001
      scope: last_text_output
    - type: tool_order
      tools:
      - TodoWrite
      - Bash
  soft: all
